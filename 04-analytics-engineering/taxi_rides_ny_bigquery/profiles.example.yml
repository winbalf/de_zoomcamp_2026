# Copy to ~/.dbt/profiles.yml and fill in your values.
# Never commit real profiles.yml (it may contain secrets).
#
# If you get "Dataset ... was not found in location US", set location to match
# your dataset's Data location (e.g. us-central1) in BigQuery Console.

taxi_rides_ny_bigquery:
  target: dev
  outputs:
    dev:
      type: bigquery
      method: oauth
      project: YOUR_GCP_PROJECT_ID
      dataset: dbt_dev
      location: us-central1  # must match where your dataset lives
      threads: 4
    prod:
      type: bigquery
      method: oauth
      project: YOUR_GCP_PROJECT_ID
      dataset: dbt_prod
      location: us-central1
      threads: 4
